[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "seed-sdk"
version = "0.1.0"
description = "Python SDK for BytePlus Seed Audio generation (fal.ai provider; BytePlus-ready)"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["byteplus", "seed", "seed-audio", "tts", "audio-generation", "fal", "ai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
# Zero runtime dependencies — uses stdlib urllib only
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-httpserver>=1.0.0",
    "mypy>=1.8.0",
    "ruff>=0.3.0",
]

[project.urls]
Repository = "https://github.com/byteplus/byteplus-seed-mcp"
Documentation = "https://fal.ai/models/bytedance/seed-audio-1.0/api"

[tool.hatch.build.targets.wheel]
packages = ["seed"]
