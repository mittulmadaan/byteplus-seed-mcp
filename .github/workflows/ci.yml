name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: Lint (ruff)
        run: uv run ruff check packages/

      - name: Type check (mypy) — SDK
        run: uv run mypy packages/seed-sdk/seed

      - name: Test — SDK
        run: uv run pytest packages/seed-sdk/tests/ -v

      - name: Test — MCP
        run: uv run pytest packages/seed-mcp/tests/ -v

      - name: Test — CLI
        run: uv run pytest packages/seed-cli/tests/ -v
