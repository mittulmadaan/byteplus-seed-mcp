services:
  - type: web
    name: byteplus-seed-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: SEED_PROVIDER
        value: byteplus
      # Set in the Render dashboard (sync: false = secret, not stored in the repo).
      - key: BYTEPLUS_SEED_API_KEY
        sync: false
      # Optional — only needed if you switch SEED_PROVIDER back to fal.
      - key: FAL_KEY
        sync: false
      - key: MCP_AUTH_TOKEN
        sync: false
